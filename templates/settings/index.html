{% extends "base.html" %}

{% block content %}
<div class="flex justify-between items-center mb-8">
    <div>
        <h1 class="text-3xl font-extrabold text-slate-800 tracking-tight">Settings</h1>
        <p class="text-slate-500 mt-1">Configure opening balances and security preferences.</p>
    </div>
</div>

<div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
    <!-- Opening Balances -->
    <div class="bg-white/80 backdrop-blur-md rounded-3xl shadow-sm border border-slate-100 overflow-hidden">
        <div class="p-6 border-b border-slate-100 bg-slate-50/50 flex items-center">
            <div class="w-10 h-10 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center mr-3">
                <i class="fas fa-wallet"></i>
            </div>
            <h2 class="text-xl font-bold text-slate-800">Opening Balances</h2>
        </div>
        
        <div class="p-8">
            <form method="POST" action="{{ url_for('settings.index') }}" class="space-y-6">
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-2">Opening Cash Balance</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <span class="text-slate-400 font-medium">₹</span>
                        </div>
                        <input type="number" step="0.01" name="opening_cash" value="{{ setting.opening_cash if setting else 0 }}" 
                               class="w-full pl-9 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 outline-none transition-all font-medium text-slate-700">
                    </div>
                    <p class="mt-2 text-xs text-slate-500"><i class="fas fa-info-circle mr-1"></i> Base amount for your cash calculations.</p>
                </div>
                
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-2">Opening Online Balance</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <span class="text-slate-400 font-medium">₹</span>
                        </div>
                        <input type="number" step="0.01" name="opening_online" value="{{ setting.opening_online if setting else 0 }}" 
                               class="w-full pl-9 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 outline-none transition-all font-medium text-slate-700">
                    </div>
                    <p class="mt-2 text-xs text-slate-500"><i class="fas fa-info-circle mr-1"></i> Base amount for your bank calculations.</p>
                </div>
                
                <div class="pt-4 mt-2">
                    <button type="submit" class="w-full bg-slate-800 hover:bg-slate-900 text-white font-semibold py-3.5 rounded-xl shadow-lg shadow-slate-800/20 transform transition-all hover:-translate-y-0.5">
                        Save Balances
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Change Password -->
    <div class="bg-white/80 backdrop-blur-md rounded-3xl shadow-sm border border-slate-100 overflow-hidden">
        <div class="p-6 border-b border-slate-100 bg-slate-50/50 flex items-center">
            <div class="w-10 h-10 rounded-full bg-rose-100 text-rose-600 flex items-center justify-center mr-3">
                <i class="fas fa-lock"></i>
            </div>
            <h2 class="text-xl font-bold text-slate-800">Security</h2>
        </div>
        
        <div class="p-8">
            <form method="POST" action="{{ url_for('settings.change_password') }}" class="space-y-6">
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-2">Current Password</label>
                    <input type="password" name="current_password" required placeholder="••••••••"
                           class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-rose-500/20 focus:border-rose-500 outline-none transition-all font-medium text-slate-700 tracking-wider">
                </div>
                
                <div class="pt-2">
                    <label class="block text-sm font-semibold text-slate-700 mb-2">New Password</label>
                    <input type="password" name="new_password" required minlength="6" placeholder="••••••••"
                           class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-rose-500/20 focus:border-rose-500 outline-none transition-all font-medium text-slate-700 tracking-wider">
                </div>

                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-2">Confirm New Password</label>
                    <input type="password" name="confirm_password" required minlength="6" placeholder="••••••••"
                           class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-rose-500/20 focus:border-rose-500 outline-none transition-all font-medium text-slate-700 tracking-wider">
                </div>
                
                <div class="pt-4 mt-2">
                    <button type="submit" class="w-full bg-gradient-to-r from-rose-500 to-pink-500 hover:from-rose-600 hover:to-pink-600 text-white font-semibold py-3.5 rounded-xl shadow-lg shadow-rose-500/30 transform transition-all hover:-translate-y-0.5">
                        Update Password
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
