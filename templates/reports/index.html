{% extends "base.html" %}

{% block content %}
<div class="flex justify-between items-center mb-8">
    <div>
        <h1 class="text-3xl font-extrabold text-slate-800 tracking-tight">Reports</h1>
        <p class="text-slate-500 mt-1">Daily overview and data export tools.</p>
    </div>
</div>

<div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
    <div class="bg-gradient-to-br from-emerald-500 to-teal-600 rounded-3xl shadow-xl shadow-emerald-500/20 p-8 text-white relative overflow-hidden group">
        <div class="absolute -right-6 -top-6 w-32 h-32 bg-white opacity-10 rounded-full blur-2xl group-hover:opacity-20 transition-opacity"></div>
        <div class="relative z-10 flex justify-between items-center">
            <div>
                <p class="text-emerald-100 font-semibold uppercase tracking-wider mb-2">Today's Revenue</p>
                <h3 class="text-4xl font-black drop-shadow-sm">₹{{ "{:,.2f}".format(todays_revenue) }}</h3>
            </div>
            <div class="w-16 h-16 rounded-2xl bg-white/10 backdrop-blur-md flex items-center justify-center border border-white/20">
                <i class="fas fa-chart-line text-3xl"></i>
            </div>
        </div>
    </div>
    
    <div class="bg-gradient-to-br from-rose-500 to-pink-600 rounded-3xl shadow-xl shadow-rose-500/20 p-8 text-white relative overflow-hidden group">
        <div class="absolute -right-6 -top-6 w-32 h-32 bg-white opacity-10 rounded-full blur-2xl group-hover:opacity-20 transition-opacity"></div>
        <div class="relative z-10 flex justify-between items-center">
            <div>
                <p class="text-rose-100 font-semibold uppercase tracking-wider mb-2">Today's Expenses</p>
                <h3 class="text-4xl font-black drop-shadow-sm">₹{{ "{:,.2f}".format(todays_expenses) }}</h3>
            </div>
            <div class="w-16 h-16 rounded-2xl bg-white/10 backdrop-blur-md flex items-center justify-center border border-white/20">
                <i class="fas fa-chart-bar text-3xl"></i>
            </div>
        </div>
    </div>
</div>

<!-- Print/Export Section -->
<div class="bg-white/80 backdrop-blur-md rounded-3xl shadow-sm border border-slate-100 p-8">
    <h2 class="text-xl font-bold text-slate-800 mb-6">Export & View Data</h2>
    <div class="flex flex-wrap gap-4">
        <button onclick="window.print()" class="bg-slate-800 hover:bg-slate-900 text-white px-6 py-3.5 rounded-xl shadow-lg shadow-slate-800/20 transform transition-all hover:-translate-y-0.5 font-medium flex items-center group">
            <i class="fas fa-print mr-3 group-hover:scale-110 transition-transform"></i> Print Daily Report
        </button>
        
        <a href="{{ url_for('revenue.index') }}" class="bg-emerald-100 hover:bg-emerald-200 text-emerald-700 px-6 py-3.5 rounded-xl font-semibold flex items-center transition-colors">
            <i class="fas fa-file-invoice-dollar mr-3"></i> View All Revenues
        </a>
        
        <a href="{{ url_for('expenses.index') }}" class="bg-rose-100 hover:bg-rose-200 text-rose-700 px-6 py-3.5 rounded-xl font-semibold flex items-center transition-colors">
            <i class="fas fa-receipt mr-3"></i> View All Expenses
        </a>
    </div>
</div>
{% endblock %}
